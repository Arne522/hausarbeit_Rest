spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
server.port=8080
logging.level.org.springframework.web=DEBUG

# JWT
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd}
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# ---------------------------------------------------------------------------
# Security-Demo-Toggles (fuer Schwachstellenanalyse)
# Jeweils auf "false" stellen, um den VERWUNDBAREN Zustand zu demonstrieren.
# ---------------------------------------------------------------------------

# 4.2 / 5.1 - Broken Authentication:
# false -> JWT-Signatur und Ablauf werden NICHT geprueft (validateTokenInsecure)
app.security.jwt-secure-validation=true

# 4.3 / 5.2 - Broken Object Level Authorization (BOLA):
# false -> jeder eingeloggte User kann alle Personen lesen/aendern/loeschen
app.security.bola-protection=true

# 4.4 / 5.3 - Rate Limiting fuer /auth/login:
# false -> kein Limit, beliebig viele Login-Versuche (Brute-Force moeglich)
app.security.rate-limiting=true
app.security.rate-limit.max-requests=5
app.security.rate-limit.window-ms=60000
